name: Dependency Review

# Runs on every PR to catch newly introduced vulnerable or license-problematic
# dependencies before they land in main.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write # allows the action to post a PR comment with findings

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        continue-on-error: true
        with:
          # Block PRs that introduce HIGH or CRITICAL vulnerabilities.
          fail-on-severity: high
          # Deny packages with these licenses (adjust to your legal requirements).
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
          # Post a summary comment on the PR.
          comment-summary-in-pr: always
