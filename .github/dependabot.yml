version: 2

updates:
  # Keep npm dependencies up to date
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: UTC
    open-pull-requests-limit: 10
    groups:
      # Batch all minor/patch updates to reduce PR noise
      minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Avoid auto-bumping chalk past v4 (ESM-only in v5+, breaking change)
      - dependency-name: chalk
        update-types: [version-update:semver-major]
    labels:
      - dependencies
    commit-message:
      prefix: 'chore(deps)'

  # Keep GitHub Actions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: 'chore(ci)'
